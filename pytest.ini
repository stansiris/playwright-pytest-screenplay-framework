[pytest]
addopts =
    --screenshot=only-on-failure
    --tracing=retain-on-failure
    --output=test-results
    --junit-xml=test-results/junit.xml
    --html=test-results/report.html
    --self-contained-html
log_cli = true
log_cli_level = INFO
markers =
    auth: Authentication-related scenarios.
    checkout: Checkout flow scenarios.
    golden_path: Golden path end-to-end scenarios.
    login: Login feature scenarios.
    ui: Browser-based UI test scenarios.
