name: CI

# Trigger strategy:
# - push/pull_request: fast validation for active development
# - workflow_dispatch: manually launched full regression with configurable defaults
on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target_os:
        description: "OS coverage for full regression"
        required: false
        type: choice
        default: ubuntu-latest
        options:
          - ubuntu-latest
          - windows-latest
          - all
      target_browser:
        description: "Browser coverage for full regression"
        required: false
        type: choice
        default: chromium
        options:
          - chromium
          - firefox
          - all
      shard_count:
        description: "Shard count per OS/browser combination"
        required: false
        type: choice
        default: "2"
        options:
          - "1"
          - "2"
          - "3"

# Avoid duplicate runs for the same ref when new commits arrive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Static quality gate: fail fast on style/lint before browser tests.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Format check (black)
        run: python -m black --check .

  # Fast validation lane for PRs/pushes.
  # Consolidates smoke, integration, e2e, and ui markers into one job.
  tests_fast:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      BROWSER: chromium
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright browser and Linux dependencies
        run: python -m playwright install --with-deps ${{ env.BROWSER }}

      - name: Test fast marker union (pytest)
        # Unified pre-merge lane: smoke + integration + e2e + ui + api + hybrid.
        # Use the runner's available logical cores automatically.
        run: pytest -q -n auto --browser "${{ env.BROWSER }}" -m "smoke or integration or e2e or ui or api or hybrid" --cov=screenplay_core --cov=examples --cov-report=xml:test-results/coverage.xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: test-results/coverage.xml
          fail_ci_if_error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-fast-ubuntu-${{ env.BROWSER }}
          path: test-results
          if-no-files-found: warn
          retention-days: 14

  # Full cross-platform/browser regression.
  # Run only when launched manually to keep push/PR feedback lean.
  # Defaults keep the matrix small for free-tier usage, but inputs can scale it up.
  full_matrix_regression:
    if: github.event_name == 'workflow_dispatch'
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.target_os == 'all' && '["ubuntu-latest","windows-latest"]' || format('["{0}"]', inputs.target_os)) }}
        browser: ${{ fromJSON(inputs.target_browser == 'all' && '["chromium","firefox"]' || format('["{0}"]', inputs.target_browser)) }}
        shard: ${{ fromJSON(inputs.shard_count == '3' && '[1,2,3]' || inputs.shard_count == '2' && '[1,2]' || '[1]') }}

    env:
      BROWSER: ${{ matrix.browser }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright browser and Linux dependencies
        if: runner.os == 'Linux'
        run: python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright browser
        if: runner.os != 'Linux'
        run: python -m playwright install ${{ matrix.browser }}

      - name: Test full regression suite (pytest)
        # pytest-split will balance shard contents using .test_durations when available.
        # Full regression should execute the complete collected suite, including
        # framework-level tests that intentionally have no functional marker.
        run: >
          pytest -q -n auto
          --browser "${{ env.BROWSER }}"
          --splits ${{ inputs.shard_count }}
          --group ${{ matrix.shard }}
          --splitting-algorithm least_duration

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-full-regression-${{ matrix.os }}-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: test-results
          if-no-files-found: warn
          # Keep manually triggered artifacts longer for diagnosis/history.
          retention-days: 30
